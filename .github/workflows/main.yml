name: NEWS

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 자동 실행
  workflow_dispatch:      # 직접 수동으로 돌려볼 수 있는 버튼 생성

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions: # 파일을 다시 저장(Push)하기 위한 권한 설정
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install feedparser requests

      - name: Run Python script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python discord_news.py

      - name: Update Memory (sent_links.txt)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_links.txt
          git commit -m "Update memory: Sent links [skip ci]" || echo "No changes to commit"
          git push
